<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Duke of Kher Keep - Welcome to the Realm</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow-x: hidden;
        }
        
        /* Navigation */
        nav {
            background: linear-gradient(135deg, #8B0000 0%, #DC143C 100%);
            padding: 1rem 0;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        
        .navbar-brand {
            font-size: 1.5rem;
            font-weight: bold;
            color: #FFD700 !important;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        
        .nav-link {
            color: white !important;
            margin: 0 0.5rem;
            font-weight: 500;
            transition: all 0.3s ease;
            position: relative;
        }
        
        .nav-link::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 0;
            height: 2px;
            background: #FFD700;
            transition: width 0.3s ease;
        }
        
        .nav-link:hover::after {
            width: 100%;
        }
        
        /* Hero Section */
        .hero {
            background: linear-gradient(135deg, #8B0000 0%, #DC143C 50%, #FF1744 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            overflow: hidden;
            position: relative;
        }
        
        .hero::before {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            width: 500px;
            height: 500px;
            background: rgba(255, 215, 0, 0.05);
            border-radius: 50%;
            animation: float 6s ease-in-out infinite;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }
        
        .hero-content {
            position: relative;
            z-index: 2;
        }
        
        .greeting {
            display: inline-block;
            background: rgba(255, 215, 0, 0.2);
            border: 2px solid #FFD700;
            color: #FFD700;
            padding: 0.5rem 1.5rem;
            border-radius: 50px;
            font-weight: bold;
            margin-bottom: 1.5rem;
            animation: slideInLeft 0.8s ease-out;
        }
        
        .hero h1 {
            font-size: 3.5rem;
            color: white;
            font-weight: 700;
            line-height: 1.1;
            margin-bottom: 1rem;
            animation: slideInLeft 0.8s ease-out 0.2s both;
        }
        
        .hero p {
            font-size: 1.1rem;
            color: rgba(255, 255, 255, 0.9);
            margin-bottom: 2rem;
            line-height: 1.8;
            max-width: 500px;
            animation: slideInLeft 0.8s ease-out 0.4s both;
        }
        
        @keyframes slideInLeft {
            from {
                opacity: 0;
                transform: translateX(-50px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
        
        .btn-group {
            margin-bottom: 2rem;
            animation: slideInLeft 0.8s ease-out 0.6s both;
        }
        
        .btn-primary-custom {
            background: #FFD700;
            color: #8B0000;
            border: none;
            padding: 0.75rem 2rem;
            font-weight: bold;
            border-radius: 4px;
            margin-right: 1rem;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: inline-block;
        }
        
        .btn-primary-custom:hover {
            background: white;
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }
        
        .btn-secondary-custom {
            background: white;
            color: #8B0000;
            border: 2px solid white;
            padding: 0.75rem 2rem;
            font-weight: bold;
            border-radius: 4px;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: inline-block;
        }
        
        .btn-secondary-custom:hover {
            background: #FFD700;
            border-color: #FFD700;
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }
        
        .social-links {
            animation: slideInLeft 0.8s ease-out 0.8s both;
        }
        
        .social-links a {
            color: rgba(255, 255, 255, 0.7);
            margin-right: 1.5rem;
            font-weight: bold;
            text-decoration: none;
            transition: all 0.3s ease;
            display: inline-block;
        }
        
        .social-links a:hover {
            color: #FFD700;
            transform: translateY(-3px);
        }
        
        .links {
            animation: slideInLeft 0.8s ease-out 0.8s both;
        }
        
        .links a {
            display: inline-block;
            margin-right: 1rem;
            margin-bottom: 1rem;
            padding: 0.75rem 1.5rem;
            background: rgba(255, 255, 255, 0.15);
            color: white;
            text-decoration: none;
            border: 2px solid white;
            border-radius: 4px;
            font-weight: 500;
            transition: all 0.3s ease;
        }
        
        .links a:hover {
            background: white;
            color: #8B0000;
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }
        
        .links a i {
            margin-right: 0.5rem;
        }
        
        /* Hero Image */
        .hero-image {
            position: relative;
            z-index: 2;
            animation: slideInRight 0.8s ease-out 0.3s both;
        }
        
        .hero-image img {
            max-width: 100%;
            height: auto;
            filter: drop-shadow(0 20px 40px rgba(0, 0, 0, 0.3));
        }
        
        @keyframes slideInRight {
            from {
                opacity: 0;
                transform: translateX(50px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            .hero {
                min-height: auto;
                padding: 3rem 0;
            }
            
            .hero h1 {
                font-size: 2rem;
            }
            
            .hero p {
                font-size: 1rem;
            }
            
            .btn-primary-custom,
            .btn-secondary-custom {
                display: block;
                width: 100%;
                margin-bottom: 1rem;
                text-align: center;
            }
            
            .social-links a {
                display: block;
                margin-right: 0;
                margin-bottom: 1rem;
            }
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container-lg">
            <a class="navbar-brand" href="#home">👑 Duke of Kher Keep</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item"><a class="nav-link" href="#home">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="https://manapool.com/shop/dukeofkherkeep" target="_blank"><i class="fas fa-shopping-cart"></i> Manapool</a></li>
                    <li class="nav-item"><a class="nav-link" href="https://github.com/drakkonnet/mtg_ai" target="_blank" rel="noopener"><i class="fab fa-github"></i> MTG AI</a></li>
                </ul>
            </div>
        </div>
    </nav>
    
    <!-- Hero Section -->
    <section class="hero" id="home">
        <div class="container-lg">
            <div class="row align-items-center">
                <div class="col-lg-6 hero-content">
                    <div class="greeting">🐉 Greetings Player</div>
                    <h1>Welcome to the realm of the Duke of Kher Keep</h1>
                    <p>Just a nerdy guy who plays Magic the Gathering and sells his cards on ManaPool</p>
                    
                    <div class="links">
                        <a href="https://manapool.com/shop/dukeofkherkeep" target="_blank"><i class="fas fa-shopping-cart"></i> ManaPool</a>
                        <a href="https://github.com/drakkonnet/mtg_ai" target="_blank" rel="noopener"><i class="fab fa-github"></i> MTG AI</a>
                    </div>
                </div>
                
                <div class="col-lg-6 text-center hero-image">
                    <img src="images/duke_of_kher_keep_card.png" alt="The Dragon of Kherkeep">
                </div>
            </div>
        </div>
    </section>
    
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
